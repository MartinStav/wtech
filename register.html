<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand" href="index.html"><img src="assets/logo.png" alt="logo"></a>
            
            <button class="btn d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
                <span class="navbar-toggler-icon"></span>
              </button>
  
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Shop</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Cart</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="container py-5 d-flex align-items-center" style="min-height: calc(100vh - 80px);">
            <div class="row w-100 justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="text-center mb-5">
                        <h1 class="mb-2">Register</h1>
                        <p class="text-secondary mb-0">Create a new account to get started</p>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label small fw-bold text-uppercase">Full name</label>
                            <input required type="text" class="form-control rounded-0" id="name" placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-uppercase">Email</label>
                            <input required type="email" class="form-control rounded-0" id="email" placeholder="your@email.com">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-bold text-uppercase">Password</label>
                            <input required type="password" class="form-control rounded-0" id="password" placeholder="••••••••">
                        </div>
                        <div class="mb-3">
                            <label for="password-confirm" class="form-label small fw-bold text-uppercase">Confirm password</label>
                            <input required type="password" class="form-control rounded-0" id="password-confirm" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mb-3 small fw-bold text-uppercase rounded-0">Register</button>
                        <p class="text-center mb-0">Already have an account? <a href="login.html" class="text-decoration-underline text-dark">Login</a></p>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
