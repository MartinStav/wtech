<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping cart - Premium coffee beans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="sticky-top bg-black">
        <nav class="container navbar navbar-expand-lg navbar-dark py-3">
            <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="../index.html">
                <img src="../assets/logo.png" alt="" width="40" height="40">
                <span class="brand-name text-accent">Gemini Coffee</span>
            </a>
            
            <button class="btn d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
                <span class="navbar-toggler-icon"></span>
              </button>
  
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="shop.html">Shop</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cart-empty.html">Cart</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container py-5">
        <h1 class="h2 fw-bold mb-4">Shopping cart</h1>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="border p-5 text-center">
                    <div class="bg-light ratio ratio-1x1 mx-auto mb-4" style="max-width: 120px;"></div>
                    <h2 class="h5 fw-bold mb-2">Cart is empty</h2>
                    <p class="text-secondary mb-4">Add products to get started</p>
                    <a href="shop.html" class="btn btn-dark rounded-0">Browse products</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
