<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="sticky-top bg-black">
        <nav class="container navbar navbar-expand-lg navbar-dark py-3">
            <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="../index.html">
                <img src="../assets/logo.png" alt="" width="40" height="40">
                <span class="brand-name text-accent">Gemini Coffee</span>
            </a>
            
            <button class="btn d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
                <span class="navbar-toggler-icon"></span>
              </button>
  
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="shop.html">Shop</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cart.html">Cart</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="auth-main">
        <section class="container py-4 py-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                    <div class="text-center mb-5">
                        <h1 class="mb-2">Login</h1>
                        <p class="text-secondary mb-0">Enter your credentials to access your account</p>
                    </div>
                    <form class="login-form">
                        <div class="mb-3">
                            <label for="loginUser" class="form-label form-label-sm fw-bold text-uppercase">Email / Username</label>
                            <input required type="text" class="form-control" id="loginUser" placeholder="your@email.com" autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label form-label-sm fw-bold text-uppercase">Password</label>
                            <input required type="password" class="form-control" id="password" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mb-3 small fw-bold text-uppercase py-2">Login</button>
                        <p class="text-center mb-0">Don't have an account? <a href="register.html" class="text-decoration-underline text-dark">Register</a></p>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <script>
        document.querySelector('.login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var u = document.getElementById('loginUser').value.trim();
            var p = document.getElementById('password').value;
            if (u === 'admin' && p === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'shop.html';
            }
        });
    </script>
</body>
</html>
